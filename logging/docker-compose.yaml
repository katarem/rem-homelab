name: rem-logging

services:
  kuma:
    image: louislam/uptime-kuma:2
    container_name: kuma
    restart: always
    ports:
      - "3001:3001"
    volumes:
      - ./data/kuma/data:/app/data
      - //var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=UTC
      - UMASK=0022
    networks:
      rem-network:
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001"]
      interval: 30s
      retries: 3
      start_period: 10s
      timeout: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"

  grafana:
    image: grafana/grafana
    container_name: grafana
    restart: unless-stopped
    user: 1000:1000
    ports:
      - '3000:3000'
    volumes:
      - "${GRAFANA_DATA_PATH:-./data/grafana}:/var/lib/grafana"
    networks:
      rem-network:

  loki:
    user: 1000:1000
    image: grafana/loki:latest
    container_name: loki
    volumes:
      - ./config/loki/loki.yaml:/etc/loki/config.yaml:ro
      - ./data/loki:/loki:rw
    ports:
      - "3100"
      - "7946"
    command: "-config.file=/etc/loki/config.yaml"
    healthcheck:
      test: [ "CMD", "/usr/bin/loki", "-health" ]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      rem-network:

networks:
  rem-network:
    external: true
    name: rem-network