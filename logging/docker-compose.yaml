name: rem-logging

services:
  grafana:
    image: grafana/grafana
    container_name: grafana
    restart: unless-stopped
    user: 1000:1000
    ports:
      - '3000:3000'
    volumes:
      - "${GRAFANA_DATA_PATH:-./data/grafana}:/var/lib/grafana"
    networks:
      rem-network:

  loki:
    user: 1000:1000
    image: grafana/loki:latest
    container_name: loki
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-retries: 2
        loki-max-backoff: 800ms
        loki-timeout: 1s
        keep-file: "true"
        mode: "non-blocking"
    volumes:
      - ./config/loki/loki.yaml:/etc/loki/config.yaml:ro
      - ./data/loki:/loki:rw
    ports:
      - '3100:3100'
      - "7946"
    command: "-config.file=/etc/loki/config.yaml"
    healthcheck:
      test: [ "CMD", "/usr/bin/loki", "-health" ]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      rem-network:
    
  prometheus:
    user: 1000:1000
    image: prom/prometheus
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - 9090:9090
    restart: unless-stopped
    volumes:
      - ./config/prometheus:/etc/prometheus
      - ./data/prometheus:/prometheus
    networks:
      rem-network:
      
networks:
  rem-network:
    external: true
    name: rem-network