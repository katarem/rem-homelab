name: rem-proxy
services:

  nginx-proxy-manager:
    container_name: nginx-proxy-manager
    image: jc21/nginx-proxy-manager:latest
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
      - 81:81
    environment:
      TZ: "Etc/UTC"
    volumes:
      - "${NGINX_DATA_PATH:-./nginx/data}:/data"
      - "${NGINX_CERT_PATH:-./nginx/letsencrypt}:/letsencrypt"
    profiles:
      - nginx
    networks:
      rem-network:
  
  duckdns:
    container_name: duckdns
    image: lscr.io/linuxserver/duckdns:latest
    env_file: ./.env
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Etc/UTC
      SUBDOMAINS: ${DUCKDNS_SUBDOMAINS}
      TOKEN: ${DUCKDNS_TOKEN}
    restart: unless-stopped
    networks: 
      rem-network:

  wireguard:
    container_name: wireguard
    image: ghcr.io/wg-easy/wg-easy:15
    env_file: ./.env
    environment:
      - INSECURE=true
    volumes:
      - ./data/wireguard:/etc/wireguard
      - /lib/modules:/lib/modules:ro
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    ports:
      - "51820:51820/udp"
      - "51821:51821/tcp"
    restart: unless-stopped
    networks:
      wg:
        ipv4_address: 10.42.42.42
        ipv6_address: fdcc:ad94:bacf:61a3::2a
      rem-network:

networks:
  wg:
    driver: bridge
    enable_ipv6: true
    ipam:
      driver: default
      config:
        - subnet: 10.42.42.0/24
        - subnet: fdcc:ad94:bacf:61a3::/64
  rem-network:
    external: true
    name: rem-network