name: rem-code
services:

  gitea:
    image: docker.gitea.com/gitea:1.25.5
    container_name: gitea
    environment:
      USER_UID: 1000
      USER_GID: 1000
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: gitea-db:5432
      GITEA__database__NAME: ${GITEA_DATABASE:-gitea}
      GITEA__database__USER: ${GITEA_DATABASE_USER:-gitea}
      GITEA__database__PASSWD: ${GITEA_DATABASE_PASSWORD:-gitea}
    restart: always
    networks:
      rem-network:
    volumes:
      - "${GITEA_DATA_PATH:-./code/data/gitea/data}:/data"
      - "${GITEA_TZ_PATH:-./code/data/gitea/etc/timezone}:/etc/timezone:ro"
      - "${GITEA_LT_PATH:-./code/data/gitea/etc/localtime}:/etc/localtime:ro"
    ports:
      - "3333:3000"
      - "222:22"

  gitea-db:
    image: docker.io/library/postgres:14
    restart: always
    environment:
      USER_UID: 1000
      USER_GID: 1000
      POSTGRES_USER: ${GITEA_DATABASE_USER:-gitea}
      POSTGRES_PASSWORD: ${GITEA_DATABASE_PASSWORD:-gitea}
      POSTGRES_DB: ${GITEA_DATABASE:-gitea}
    networks:
      rem-network:
    volumes:
      - "${GITEA_DATABASE_PATH:-./code/data/gitea/database}:/var/lib/postgresql/data"

  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    read_only: true
    env_file: ./code/.env
    environment:
      USER_UID: 1000
      USER_GID: 1000
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/${SONARQUBE_DATABASE:-sonar}
      SONAR_JDBC_USERNAME: ${SONARQUBE_DATABASE_USER:-sonar}
      SONAR_JDBC_PASSWORD: ${SONARQUBE_DATABASE_PASSWORD:-sonar}
    volumes:
      - "${SONAR_DATA_PATH:-./code/data/sonarqube/data}:/opt/sonarqube/data"
      - "${SONAR_EXTENSIONS_PATH:-./code/data/sonarqube/extensions}:/opt/sonarqube/extensions"
      - "${SONAR_LOGS_PATH:-./code/data/sonarqube/logs}:/opt/sonarqube/logs"
      - "${SONAR_TMP_PATH:-./code/data/sonarqube/temp}:/opt/sonarqube/temp"
    tmpfs:
      - /tmp:size=256M,mode=1777
    ports:
      - "9000:9000"
    networks:
      rem-network:

  sonarqube-db:
    image: docker.io/library/postgres:17
    restart: always
    env_file: ./code/.env
    environment:
      USER_UID: 1000
      USER_GID: 1000
      POSTGRES_USER: ${SONARQUBE_DATABASE_USER:-sonar}
      POSTGRES_PASSWORD: ${SONARQUBE_DATABASE_PASSWORD:-sonar}
      POSTGRES_DB: ${SONARQUBE_DATABASE:-sonar}
    networks:
      rem-network:
    volumes:
      - "${SONAR_DATABASE_PATH:-./code/data/sonarqube/database}:/var/lib/postgresql/data"

networks:
  rem-network:
    external: true
    name: rem-network