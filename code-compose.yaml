services:

  gitea:
    image: docker.gitea.com/gitea:1.25.5
    container_name: gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
    restart: always
    networks:
      rem-network:
    volumes:
      - ./code/data/gitea/data:/data
      - ./code/data/gitea/etc/timezone:/etc/timezone:ro
      - ./code/data/gitea/etc/localtime:/etc/localtime:ro
    ports:
      - "3333:3000"
      - "222:22"

  gitea-db:
    image: docker.io/library/postgres:14
    restart: always
    environment:
      - POSTGRES_USER=${GITEA_DATABASE_USER:-gitea}
      - POSTGRES_PASSWORD=${GITEA_DATABASE_PASSWORD:-gitea}
      - POSTGRES_DB=${GITEA_DATABASE:-gitea}
    networks:
      rem-network:
    volumes:
      - ./code/data/gitea/database/:/var/lib/postgresql/data

  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    read_only: true
    env_file: ./code/.env
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/${SONARQUBE_DATABASE:-sonar}
      SONAR_JDBC_USERNAME: ${SONARQUBE_DATABASE_USER:-sonar}
      SONAR_JDBC_PASSWORD: ${SONARQUBE_DATABASE_PASSWORD:-sonar}
    volumes:
      - ./code/data/sonarqube/data:/opt/sonarqube/data
      - ./code/data/sonarqube/extensions:/opt/sonarqube/extensions
      - ./code/data/sonarqube/logs:/opt/sonarqube/logs
      - ./code/data/sonarqube/temp:/opt/sonarqube/temp
    tmpfs:
      - /tmp:size=256M,mode=1777
    ports:
      - "9000:9000"
    networks:
      rem-network:

  sonarqube-db:
    image: docker.io/library/postgres:17
    restart: always
    env_file: ./code/.env
    environment:
      - POSTGRES_USER=${SONARQUBE_DATABASE_USER:-sonar}
      - POSTGRES_PASSWORD=${SONARQUBE_DATABASE_PASSWORD:-sonar}
      - POSTGRES_DB=${SONARQUBE_DATABASE:-sonar}
    networks:
      rem-network:
    volumes:
      - ./code/data/sonarqube/database/:/var/lib/postgresql/data

networks:
  rem-network:
    external: true
    name: rem-network