services:

  boostack:
    image: lscr.io/linuxserver/bookstack:version-v25.12.3
    container_name: bookstack
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      # APP_URL must be set as the base URL you'd expect to access BookStack
      # on via the browser. The default shown here is what you might use if accessing
      # direct from the browser on the docker host, hence the use of the port as configured below.
      - APP_URL=${BOOKSTACK_BASE_URL:-http://localhost:6875}
      - APP_LANG=en
      # APP_KEY must be a unique key. Generate your own by running
      # docker run -it --rm --entrypoint /bin/bash lscr.io/linuxserver/bookstack:latest appkey
      # You should keep the "base64:" part for the option value.
      - APP_KEY=${BOOKSTACK_APP_KEY:?App Key is needed}

      - DB_HOST=bookstack-db
      - DB_PORT=3306
      - DB_DATABASE=${BOOKSTACK_DATABASE:-bookstack}
      - DB_USERNAME=${BOOKSTACK_DATABASE_USER:-bookstack}
      - DB_PASSWORD=${BOOKSTACK_DATABASE_PASSWORD:-bookstack8432}
    volumes:
      - ./documentation/data/bookstack/config:/config
    ports:
      - 6875:80
    restart: unless-stopped
    networks:
      rem-network:

  bookstack-db:
    image: lscr.io/linuxserver/mariadb:11.4.8
    container_name: bookstack-db
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - MYSQL_ROOT_PASSWORD=${BOOKSTACK_DATABASE_ROOT_PASSWORD:-password123}
      - MYSQL_DATABASE=${BOOKSTACK_DATABASE:-bookstack}
      - MYSQL_USER=${BOOKSTACK_DATABASE_USER:-bookstack}
      - MYSQL_PASSWORD=${BOOKSTACK_DATABASE_PASSWORD:-bookstack8432}
    volumes:
      - bookstack-db:/config
    restart: unless-stopped
    networks:
      rem-network:

  wiki-db:
    container_name: wiki-db
    image: postgres:15-alpine
    env_file: ./documentation/.env
    environment:
      POSTGRES_DB: ${WIKI_DATABASE:-wikijs}
      POSTGRES_PASSWORD: ${WIKI_DATABASE_PASSWORD:-wikijsrocks}
      POSTGRES_USER: ${WIKI_DATABASE_USER:-wikijs}
    logging:
      driver: none
    restart: unless-stopped
    volumes:
      - ./documentation/data/wikijs-db/data:/var/lib/postgresql/data
    networks:
      rem-network:

  wiki:
    image: ghcr.io/requarks/wiki:2
    depends_on:
      - wiki-db
    env_file: ./documentation/.env
    environment:
      DB_TYPE: postgres
      DB_HOST: wiki-db
      DB_PORT: 5432
      DB_USER: ${WIKI_DATABASE_USER:-wikijs}
      DB_PASS: ${WIKI_DATABASE_PASSWORD:-wikijsrocks}
      DB_NAME:  ${WIKI_DATABASE:-wiki}
    restart: unless-stopped
    ports:
      - "3200:3000"
    networks:
      rem-network:

volumes:
  bookstack-db:

networks:
  rem-network:
    external: true
    name: rem-network