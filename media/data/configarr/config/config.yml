telemetry: false
customFormatDefinitions:
  - trash_id: custom-anime-spanish-subs
    trash_scores:
      default: 150
    trash_description: "Anime release title indicates Spanish subtitles"
    name: "Anime Spanish Subs"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: "Explicit Spanish subtitle tags"
        implementation: ReleaseTitleSpecification
        negate: false
        required: true
        fields:
          value: >-
            (?i)\b(?:
              (?:sub(?:s|bed|titles?)|subtit(?:les|ulos?))
              [ ._-]?
              (?:es|esp|spa|spanish|español|castellano|latam|latino)
              |
              (?:es|esp|spa|spanish|español|castellano|latam|latino)
              [ ._-]?
              (?:sub(?:s|bed|titles?)|subtit(?:les|ulos?))
            )\b

  - trash_id: custom-anime-multi-subs
    trash_scores:
      default: 50
    trash_description: "Anime release title indicates multi subtitles"
    name: "Anime Multi Subs"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: "Multi subtitle tags"
        implementation: ReleaseTitleSpecification
        negate: false
        required: true
        fields:
          value: >-
            (?i)\b(?:multi(?:[ ._-]?(?:sub(?:s|bed|titles?)|subtit(?:les|ulos?)))?|multi)\b
  - trash_id: custom-spanish-audio
    trash_scores:
      default: 200
    trash_description: "Release contains Spanish audio"
    name: "Spanish Audio"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: "Spanish audio in title"
        implementation: ReleaseTitleSpecification
        negate: false
        required: true
        fields:
          value: >-
            (?i)\b(?:esp|spa|spanish|español|castellano|lat(?:am|ino)?)\b

  - trash_id: custom-dual-audio
    trash_scores:
      default: 100
    trash_description: "Dual or multi audio release"
    name: "Dual Audio / Multi"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: "Dual or multi audio"
        implementation: ReleaseTitleSpecification
        negate: false
        required: true
        fields:
          value: >-
            (?i)\b(?:dual(?:[ ._-]?audio)?|multi(?:[ ._-]?audio)?)\b

sonarr:
  anime:
    base_url: http://sonarr:8989
    api_key: !secret SONARR_API_KEY
    quality_definition:
      type: anime
    include:
      - template: sonarr-quality-definition-anime
      - template: sonarr-v4-quality-profile-anime
      - template: sonarr-v4-custom-formats-anime
    custom_formats:
      - trash_ids:
        - custom-anime-spanish-subs
        assign_scores_to:
          - name: Remux-1080p - Anime
            score: 150
      - trash_ids:
        - custom-anime-multi-subs
        assign_scores_to:
          - name: Remux-1080p - Anime
            score: 50
  main:
    base_url: http://sonarr:8989
    api_key: !secret SONARR_API_KEY
    quality_definition:
      type: series
    include:
      - template: sonarr-v4-quality-profile-web-1080p
      - template: sonarr-v4-custom-formats-web-1080p
      - template: sonarr-v4-quality-profile-web-2160p
      - template: sonarr-v4-custom-formats-web-2160p
    custom_formats:
      - trash_ids:
          - custom-spanish-audio
        assign_scores_to:
          - name: WEB-1080p - ES
            score: 200
      - trash_ids:
          - custom-dual-audio
        assign_scores_to:
          - name: WEB-1080p - ES
            score: 80
      - trash_ids:
          - custom-spanish-audio
        assign_scores_to:
          - name: WEB-2160p - ES
            score: 200
      - trash_ids:
          - custom-dual-audio
        assign_scores_to:
          - name: WEB-2160p - ES
            score: 80

