name: 'rem-dashboard'
services:

  homarr:
    container_name: homarr
    image: ghcr.io/homarr-labs/homarr:latest
    restart: unless-stopped
    volumes:
      - ./dashboard/data/homarr/appdata:/appdata
    env_file: ./dashboard/.env
    environment:
      - SECRET_ENCRYPTION_KEY=${HOMARR_SECRET_ENCRYPTION_KEY}
    ports:
      - "7575:7575"
    networks:
      rem-network:
networks:
  rem-network:
    name: rem-network
    external: true